name: main

on:
  push:
    branches: [ dev ]
    paths-ignore:
      - '.github/workflows/main.yml'

jobs:
  Run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install requirements
      run: pip3 install -r requirements.txt

    - name: Run
      run: python3 main.py --client linux--username $USERNAME_LINUX_DO --password $PASSWORD_LINUX_DO
