name: main

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '.github/workflows/main.yml'

jobs:
  Run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.8'

    - name: Install requirements
      run: pip3 install -r requirements.txt

    - name: Run
      run: python3 --version
